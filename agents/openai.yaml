interface:
  display_name: "电商运营诊断"
  short_description: "主图/详情页/人群/数据/运营策略 五段总编排诊断，缺数据降级、不编不预测、来源必标"
  default_prompt: "使用 $电商运营诊断 给我的产品/店铺做诊断：我会提供物料（主图/详情页截图、文字）、品类、客单价、人群、竞品，以及真实数据（客群占比/流量·客群·SKU 三联表）。请先读 SKILL.md 判断走哪段或整链，严格守贯穿红线：缺数据降级标注、不编百分比/频率、不预测业绩、来源必标 [数据]/[推断]。真实数据不全时先按 references/真实数据采集.md 引导我去取，别替我编。"
